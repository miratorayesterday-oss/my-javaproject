name: ci

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        run: |
          # 1. すべてのJavaファイルをコンパイル
          javac *.java
          
          # 2. マニフェストファイル（設定ファイル）を作成
          echo "Manifest-Version: 1.0" > manifest.txt
          
          # 3. JARファイルを作成（現在のフォルダにあるクラスファイルを全部入れる）
          jar cvfm GradualMagic1.12.2.jar manifest.txt *.class

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mod-Jar
          path: GradualMagic1.12.2.jar
