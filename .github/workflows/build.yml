name: ci

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build JAR
        run: |
          # 1. Hello.javaをコンパイルしてHello.classを作る
          javac Hello.java
          
          # 2. JARファイルを作成する
          # 順番: jar cfe [完成品の名前] [メインクラス名] [含めるファイル]
          jar cfe GradualMagic1.12.2.jar Hello Hello.class

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-jar-file
          path: GradualMagic1.12.2.jar
